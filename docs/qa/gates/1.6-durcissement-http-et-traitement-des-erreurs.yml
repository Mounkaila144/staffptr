top_issues:
  - id: "OPS-004"
    severity: medium
    finding: "UFW est volontairement inactif : l'inventaire préalable a relevé huit ports tiers publics (3001, 3002, 3003, 3005, 3011, 3020, 3030, 3040) appartenant aux autres projets du serveur, et l'exploitant a choisi de ne pas activer le pare-feu plutôt que de statuer sur ces services. L'AC 3 (« UFW limité aux ports 22/80/443 ») n'est donc pas réalisé — décision consignée en DEC-14."
    suggested_action: "MariaDB et Redis restent bornés à la boucle locale — la surface PTR Staff est contenue. À réévaluer si un service PTR Staff cessait d'écouter localement, si l'un des huit ports tiers se révélait derrière un reverse proxy Apache (auquel cas UFW pourrait le fermer sans casse), ou lors d'un passage à un VPS dédié (condition de révision DEC-05)."
    suggested_owner: "po"
  - id: "SEC-001"
    severity: low
    finding: "style-src 'self' sans unsafe-inline bloque tout attribut style inline et toute liaison :style. Les pages actuelles n'en utilisent pas — prouvé par Playwright — mais une future page qui en introduirait échouerait silencieusement (styles ignorés, aucune erreur serveur)."
    suggested_action: "S'en tenir aux classes Tailwind. Si un besoin réel d'attribut style apparaît, documenter et motiver l'assouplissement CSP comme la story 1.6 l'exige, jamais l'ajouter en silence. La 1.7 (socle d'interface) est la première concernée."
    suggested_owner: "dev"
  - id: "GOV-001"
    severity: low
    finding: "L'en-tête HSTS porte preload mais la soumission de ptrniger.com à la liste des navigateurs n'est pas faite — conformément à la story : acte quasi irréversible qui forcerait HTTPS sur tous les sous-domaines du domaine partagé."
    suggested_action: "Inscrire la décision à l'ordre du jour de la direction avec l'inventaire des sous-domaines exigé par le runbook. Sans urgence : l'en-tête protège déjà les visiteurs du domaine."
    suggested_owner: "po"

