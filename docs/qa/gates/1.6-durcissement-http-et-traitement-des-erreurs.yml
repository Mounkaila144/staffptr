story: "1.6"
story_title: "Durcissement HTTP et traitement des erreurs"
gate: CONCERNS
status_reason: "Le dépôt livre un durcissement complet et prouvé : CSP sans unsafe-inline validée par Playwright sur les pages rendues, masquage de journal vérifié sur le fichier écrit trace comprise, limiteur et pages d'erreur conformes. La réserve n'est pas sur le code : TLS, redirection 301 et UFW sont des actes serveur que seul l'exploitant peut établir, et la décision preload appartient à la direction."
reviewer: "Quinn (Test Architect)"
updated: "2026-07-19T19:31:00+01:00"

waiver: { active: false }

top_issues:
  - id: "OPS-003"
    severity: medium
    finding: "AC 1 et 3 décrivent un état serveur — certificats, redirection 301, TLS 1.2 minimum, UFW 22/80/443 — qu'aucun test du dépôt ne peut établir. Le runbook docs/ops/http-hardening.md est livré et exécutable, mais rien n'est encore exécuté sur le VPS."
    suggested_action: "Exécuter le runbook sur staging.staff.ptrniger.com puis staff.ptrniger.com (la propagation DNS doit être acquise au préalable), consigner curl -I (301 et en-têtes), openssl s_client (dates de certificat) et ufw status au journal d'exploitation, puis passer la story à Done."
    suggested_owner: "po"
  - id: "SEC-001"
    severity: low
    finding: "style-src 'self' sans unsafe-inline bloque tout attribut style inline et toute liaison :style. Les pages actuelles n'en utilisent pas — prouvé par Playwright — mais une future page qui en introduirait échouerait silencieusement (styles ignorés, aucune erreur serveur)."
    suggested_action: "S'en tenir aux classes Tailwind. Si un besoin réel d'attribut style apparaît, documenter et motiver l'assouplissement CSP comme la story 1.6 l'exige, jamais l'ajouter en silence."
    suggested_owner: "dev"
  - id: "GOV-001"
    severity: low
    finding: "L'en-tête HSTS porte preload mais la soumission de ptrniger.com à la liste des navigateurs n'est pas faite — conformément à la story : acte quasi irréversible qui forcerait HTTPS sur tous les sous-domaines du domaine partagé."
    suggested_action: "Inscrire la décision à l'ordre du jour de la direction avec l'inventaire des sous-domaines exigé par le runbook. Sans urgence : l'en-tête protège déjà les visiteurs du domaine."
    suggested_owner: "po"

