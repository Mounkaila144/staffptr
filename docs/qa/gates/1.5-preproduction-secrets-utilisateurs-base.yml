story_title: "Préproduction, secrets et deux utilisateurs de base"
gate: CONCERNS
status_reason: "Le dépôt livré est correct et prouvé par injection sur cinq chemins de fuite distincts. La réserve n'est pas sur le code : cette story ne devient réelle qu'après exécution sur le VPS par l'exploitant, et la matrice de privilèges impose désormais une obligation permanente à chaque migration métier des epics 2 à 8."
reviewer: "Quinn (Test Architect)"
updated: "2026-07-19T10:30:00+01:00"

waiver: { active: false }

top_issues:
  - id: "OPS-001"
    severity: medium
    finding: "Les comptes, schémas et secrets n'existent que sous forme de modèle SQL et de runbook. AC 1, 2, 3 et 6 décrivent un état d'infrastructure qu'aucun test ne peut établir — la story le reconnaît explicitement : « la vraie preuve sur le VPS est le SHOW GRANTS consigné par l'exploitant, pas un test vert »."
    suggested_action: "Exécuter le runbook sur le VPS et joindre les quatre sorties de SHOW GRANTS au journal d'exploitation avant de passer la story à Done. Les lire en négatif : absence de DELETE sur les tables métier, absence d'UPDATE sur audit_logs, absence de ON *.*, absence de tout schéma appartenant à un autre projet."
  - id: "OPS-002"
    severity: medium
    finding: "La matrice retenue accorde SELECT et INSERT au niveau du schéma, mais UPDATE table par table. Toute migration créant une table métier à partir de la story 2.1 doit donc s'accompagner d'un GRANT UPDATE, faute de quoi l'application échouera à l'exécution sur cette table."
    suggested_action: "L'obligation est écrite dans docs/ops/database-users.md et vérifiée par test. Elle reste une charge permanente : à rappeler à chaque story créant une table métier."
  - id: "PROC-001"
    severity: low
    finding: "L'agent dev a modifié le critère d'acceptation 3 bis, alors que sa définition ne l'autorise qu'à cocher des tâches et remplir le Dev Agent Record. Le contenu produit est correct et correspond à ce que la revue demandait."
    suggested_action: "Sans conséquence ici. À surveiller : un dev qui ajuste les critères peut finir par les ajuster à ce qu'il a construit."

