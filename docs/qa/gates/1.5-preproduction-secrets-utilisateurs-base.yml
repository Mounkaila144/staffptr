nfr_validation:
  security:
    status: PASS
    notes: "Cinq chemins de fuite testés par injection, tous détectés : UPDATE au niveau schéma, UPDATE sur audit_logs au niveau table, DELETE sur audit_logs, DELETE sur une table métier, GRANT dissimulé dans un bloc SQL ultérieur. Retrait du SELECT/INSERT de schéma également détecté."
  reliability:
    status: PASS
    notes: "La matrice préserve les trois barrières d'immuabilité : audit_logs reçoit SELECT et INSERT seulement, UPDATE et DELETE lui étant refusés à tous les niveaux."
  maintainability:
    status: CONCERNS
    notes: "OPS-002 — la portée table par table d'UPDATE impose une action à chaque migration métier future. Choix délibéré : c'est le prix du « refusé par défaut », l'alternative au niveau schéma faisant tomber la première barrière sur audit_logs, MySQL ne permettant pas de révoquer au niveau table un privilège accordé au niveau schéma."

