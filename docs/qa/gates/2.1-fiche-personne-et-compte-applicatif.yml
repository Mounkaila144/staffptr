top_issues:
  - id: "OPS-005"
    severity: low
    finding: "Les grants réels de people/users n'existent pas encore sur ptrstaff_staging ni ptrstaff_prod : ils seront posés par les migrations au prochain déploiement VPS, et le runbook § « Actions dues à l'exploitant » demande un SHOW GRANTS consigné. Aucun écran ne consomme ces tables en production — rien n'est cassé dans l'intervalle."
    suggested_action: "Au prochain déploiement : migrer, puis consigner les SHOW GRANTS en lecture négative (UPDATE présent, DELETE absent sur people/users) au journal d'exploitation."
    suggested_owner: "po"
  - id: "SEC-002"
    severity: low
    finding: "Le filtre withoutSecrets d'AuditLogger n'écarte que les clés contenant password — conforme à la story, mais token et secret ne sont pas couverts alors qu'ils le sont dans le masquage Monolog de 1.6."
    suggested_action: "Étendre le filtre aux clés token/secret lorsque des jetons apparaîtront dans le périmètre audité (epic 2, réinitialisations)."
    suggested_owner: "dev"
  - id: "ARCH-001"
    severity: low
    finding: "La garantie centrale de la story (colonne générée + index unique) est prouvée sur MySQL 8 en CI mais s'exécutera sur MariaDB 10.11 en production (DEC-12) — précisément le type de mécanisme dont la sémantique peut différer entre moteurs."
    suggested_action: "La story a fait le maximum à son niveau : vérification par métadonnées du moteur, signalement explicite. Arbitrage d'architecture à prévoir — job CI MariaDB d'appoint, ou acceptation durable consignée. À porter au registre si l'écart se matérialise."
    suggested_owner: "po"

