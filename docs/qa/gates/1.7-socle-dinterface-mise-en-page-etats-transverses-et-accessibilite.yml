top_issues:
  - id: "UX-001"
    severity: low
    finding: "Les glyphes des pastilles et de la navigation sont des caractères Unicode (⏳, ⌂, ¤…) et non les SVG inline prévus au § 7.4 de la spec — sur Chrome Android, certains se rendent en emoji couleur d'apparence variable selon la plateforme."
    suggested_action: "Passe d'iconographie ultérieure : substituer des SVG inline dessinés à la demande. L'API des composants (glyphe comme donnée) permet la substitution sans réécriture. Le triple encodage glyphe+libellé+couleur reste garanti dans l'intervalle."
    suggested_owner: "dev"
  - id: "UX-002"
    severity: low
    finding: "StatusBadge replie silencieusement tout statut inconnu sur « brouillon » — une faute de frappe d'appelant produirait un état faux sans aucun signal."
    suggested_action: "Ajouter un avertissement de développement (validator de prop ou console.warn hors production) lors d'un statut hors des six états."
    suggested_owner: "dev"
  - id: "PROC-002"
    severity: low
    finding: "La recette manuelle sur téléphone réel en 3G dégradée, exigée par la stratégie de vérification (§ 18.4), reste due — la simulation Playwright ne la remplace pas."
    suggested_action: "À exécuter avant la mise en service de l'application (fin d'epic 2 au plus tard), pas avant la clôture de cette story. Consigner l'appareil, le réseau et les constats."
    suggested_owner: "po"

