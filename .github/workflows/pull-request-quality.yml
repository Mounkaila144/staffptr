name: Pull Request Quality

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

concurrency:
  group: pr-quality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pint:
    name: Pint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - uses: actions/cache@v5
        with:
          path: ~/.cache/composer/files
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
      - run: composer install --prefer-dist --no-interaction --no-progress
      - run: vendor/bin/pint --test

  larastan:
    name: Larastan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - uses: actions/cache@v5
        with:
          path: ~/.cache/composer/files
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
      - run: composer install --prefer-dist --no-interaction --no-progress
      - run: vendor/bin/phpstan analyse --memory-limit=1G --no-progress

  phpunit:
    name: PHPUnit (MySQL 8)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root-ci-only
          MYSQL_DATABASE: staffptr_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --host=127.0.0.1 --user=root --password=root-ci-only"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      APP_ENV: testing
      APP_KEY: base64:MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=
      APP_TIMEZONE: UTC
      APP_DISPLAY_TIMEZONE: Africa/Niamey
      APP_CURRENCY: XOF
      APP_LOCALE: fr
      APP_FALLBACK_LOCALE: fr
      CACHE_STORE: array
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: staffptr_test
      DB_USERNAME: staffptr_app_ci
      DB_PASSWORD: staffptr-app-ci-only
      DB_MIGRATION_HOST: 127.0.0.1
      DB_MIGRATION_PORT: 3306
      DB_MIGRATION_DATABASE: staffptr_test
      DB_MIGRATION_USERNAME: staffptr_migrate_ci
      DB_MIGRATION_PASSWORD: staffptr-migrate-ci-only
      AUDIT_DB_MIGRATION_CONNECTION: mysql_migration
      AUDIT_DB_APP_USERNAME: staffptr_app_ci
      AUDIT_DB_APP_HOST: '%'
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: pdo_mysql
      - uses: actions/cache@v5
        with:
          path: ~/.cache/composer/files
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
      - run: composer install --prefer-dist --no-interaction --no-progress
      - run: cp .env.example .env
      - name: Provisionner les comptes MySQL éphémères
        env:
          MYSQL_CONTAINER: ${{ job.services.mysql.id }}
        run: >-
          docker exec "${MYSQL_CONTAINER}" mysql
          --user=root
          --password=root-ci-only
          --execute="SET GLOBAL log_bin_trust_function_creators = 1;
          CREATE USER 'staffptr_migrate_ci'@'%' IDENTIFIED BY 'staffptr-migrate-ci-only';
          GRANT ALL PRIVILEGES ON staffptr_test.* TO 'staffptr_migrate_ci'@'%' WITH GRANT OPTION;
          CREATE USER 'staffptr_app_ci'@'%' IDENTIFIED BY 'staffptr-app-ci-only';
          FLUSH PRIVILEGES;"
      - name: Afficher le moteur de migration
        run: php artisan db:show --database=mysql_migration
      - name: Migrer avec le compte privilégié
        run: php artisan migrate:fresh --database=mysql_migration --force
      - name: Afficher le moteur applicatif restreint
        run: php artisan db:show --database=mysql
      - run: php artisan test

  frontend:
    name: Frontend Build & Budget
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run test:ci-scripts
      - run: npm run build
      - run: npm run check:bundle

  playwright:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: pdo_sqlite
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - uses: actions/cache@v5
        with:
          path: ~/.cache/composer/files
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: composer install --prefer-dist --no-interaction --no-progress
      - run: npm ci
      - run: cp .env.example .env
      - run: touch database/database.sqlite
      - run: php artisan key:generate --force
      - run: php artisan migrate:fresh --force
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Publier les traces en cas d'échec
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-failure-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  duration:
    name: CI Duration
    if: always()
    needs:
      - pint
      - larastan
      - phpunit
      - frontend
      - playwright
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - name: Mesurer la durée observable
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CI_DURATION_LIMIT_SECONDS: 600
        run: node tests/ci/check-workflow-duration.mjs
